services:
  - type: web
    name: nithya-portfolio
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: NEXT_PUBLIC_SPLINE_URL
        sync: false
      - key: PORT
        value: "3000"
